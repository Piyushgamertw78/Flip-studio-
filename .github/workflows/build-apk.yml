name: Build FlipStudio Release APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build web app (Vite)
        working-directory: artifacts/flipstudio
        env:
          BASE_PATH: "/"
          NODE_ENV: production
        run: pnpm run build

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          yes | sdkmanager --licenses 2>/dev/null || true
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Generate release keystore
        run: |
          keytool -genkeypair \
            -v \
            -storetype PKCS12 \
            -keystore flipstudio-release.keystore \
            -alias flipstudio \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass flipstudio2024 \
            -keypass flipstudio2024 \
            -dname "CN=FlipStudio, OU=FlipStudio, O=FlipStudio, L=India, ST=India, C=IN"
          cp flipstudio-release.keystore artifacts/flipstudio/android/app/

      - name: Add signing config to build.gradle
        working-directory: artifacts/flipstudio/android/app
        run: |
          python3 << 'PYEOF'
          import re

          with open('build.gradle', 'r') as f:
              content = f.read()

          signing_config = '''
              signingConfigs {
                  release {
                      storeFile file('flipstudio-release.keystore')
                      storePassword 'flipstudio2024'
                      keyAlias 'flipstudio'
                      keyPassword 'flipstudio2024'
                  }
              }'''

          # Insert signingConfigs before buildTypes
          content = content.replace(
              '    buildTypes {',
              signing_config + '\n    buildTypes {'
          )

          # Update release buildType to use signingConfig
          content = content.replace(
              '''    buildTypes {
              release {
                  minifyEnabled false
                  proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
              }''',
              '''    buildTypes {
              release {
                  minifyEnabled false
                  proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
                  signingConfig signingConfigs.release
              }'''
          )

          with open('build.gradle', 'w') as f:
              f.write(content)

          print("build.gradle updated with signing config")
          PYEOF

      - name: Write local.properties
        working-directory: artifacts/flipstudio/android
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Sync Capacitor assets
        working-directory: artifacts/flipstudio
        run: |
          mkdir -p android/app/src/main/assets
          # Copy web build to android assets
          if [ -d dist/public ]; then
            cp -r dist/public/. android/app/src/main/assets/
          elif [ -d dist ]; then
            cp -r dist/. android/app/src/main/assets/
          fi
          # Ensure capacitor plugin JSON exists
          if [ ! -f android/app/src/main/assets/capacitor.plugins.json ]; then
            echo "[]" > android/app/src/main/assets/capacitor.plugins.json
          fi
          # Copy capacitor config
          cp capacitor.config.json android/app/src/main/assets/capacitor.config.json 2>/dev/null || true
          # Try cap sync (optional)
          ./node_modules/.bin/cap sync android --inline 2>/dev/null || true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('artifacts/flipstudio/android/**/*.gradle*') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Make gradlew executable
        working-directory: artifacts/flipstudio/android
        run: chmod +x gradlew

      - name: Build Release APK
        working-directory: artifacts/flipstudio/android
        run: |
          ./gradlew assembleRelease \
            --no-daemon \
            --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m" \
            -Dorg.gradle.daemon=false

      - name: Locate and rename APK
        run: |
          mkdir -p release-output
          APK=$(find artifacts/flipstudio/android -name "*.apk" -path "*/release/*" | head -1)
          if [ -z "$APK" ]; then
            APK=$(find artifacts/flipstudio/android -name "*.apk" | head -1)
          fi
          if [ -z "$APK" ]; then
            echo "ERROR: No APK found!"
            exit 1
          fi
          echo "Found APK: $APK"
          cp "$APK" release-output/FlipStudio.apk
          ls -lh release-output/

      - name: Upload FlipStudio APK
        uses: actions/upload-artifact@v4
        with:
          name: FlipStudio-Release-APK
          path: release-output/FlipStudio.apk
          if-no-files-found: error
          retention-days: 90

      - name: Summary
        run: |
          echo "## FlipStudio Release APK" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Build successful!**" >> $GITHUB_STEP_SUMMARY
          echo "- App: FlipStudio" >> $GITHUB_STEP_SUMMARY
          echo "- Package: com.flipstudio.app" >> $GITHUB_STEP_SUMMARY
          echo "- Type: Release (signed)" >> $GITHUB_STEP_SUMMARY
          echo "- Size: $(du -sh release-output/FlipStudio.apk | cut -f1)" >> $GITHUB_STEP_SUMMARY
