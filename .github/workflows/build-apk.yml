name: Build FlipStudio APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build web app (Vite)
        working-directory: artifacts/flipstudio
        env:
          BASE_PATH: "/"
          NODE_ENV: production
        run: pnpm run build

      - name: Verify web build
        run: |
          ls -lh artifacts/flipstudio/dist/public/
          echo "Web build OK"

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 35 components
        run: |
          yes | sdkmanager --licenses 2>/dev/null || true
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Sync Capacitor into Android
        working-directory: artifacts/flipstudio
        run: |
          mkdir -p android/app/src/main/assets
          if [ ! -f android/app/src/main/assets/capacitor.plugins.json ]; then
            echo "[]" > android/app/src/main/assets/capacitor.plugins.json
          fi
          cp capacitor.config.json android/app/src/main/assets/capacitor.config.json 2>/dev/null || true
          ./node_modules/.bin/cap sync android --inline

      - name: Write local.properties
        working-directory: artifacts/flipstudio/android
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('artifacts/flipstudio/android/**/*.gradle*') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Make gradlew executable
        working-directory: artifacts/flipstudio/android
        run: chmod +x gradlew

      - name: Build Debug APK
        working-directory: artifacts/flipstudio/android
        run: |
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FlipStudio-debug.apk
          path: artifacts/flipstudio/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30

      - name: Done
        run: echo "APK built successfully!"
