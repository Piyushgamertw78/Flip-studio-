name: Release APK

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Build & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build web assets
        working-directory: artifacts/flipstudio
        env:
          BASE_PATH: "/"
          NODE_ENV: production
        run: pnpm run build

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          yes | sdkmanager --licenses 2>/dev/null || true
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Set up release keystore
        run: |
          if [ -n "${{ secrets.FLIPSTUDIO_KEYSTORE_BASE64 }}" ]; then
            echo "Using persistent keystore from GitHub Secret"
            echo "${{ secrets.FLIPSTUDIO_KEYSTORE_BASE64 }}" | base64 -d > flipstudio-release.keystore
          else
            echo "Generating a fresh keystore (APKs will not be upgrade-compatible)"
            keytool -genkeypair \
              -v \
              -storetype PKCS12 \
              -keystore flipstudio-release.keystore \
              -alias flipstudio \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass flipstudio2024 \
              -keypass flipstudio2024 \
              -dname "CN=FlipStudio, OU=FlipStudio, O=FlipStudio, L=India, ST=India, C=IN"
          fi
          cp flipstudio-release.keystore artifacts/flipstudio/android/app/flipstudio-release.keystore

      - name: Write local.properties
        working-directory: artifacts/flipstudio/android
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Sync web assets into Android
        working-directory: artifacts/flipstudio
        run: |
          mkdir -p android/app/src/main/assets
          cp -r dist/public/. android/app/src/main/assets/
          if [ ! -f android/app/src/main/assets/capacitor.plugins.json ]; then
            echo "[]" > android/app/src/main/assets/capacitor.plugins.json
          fi
          cp capacitor.config.json android/app/src/main/assets/capacitor.config.json
          ./node_modules/.bin/cap sync android --inline 2>/dev/null && echo "cap sync done" || echo "cap sync skipped"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('artifacts/flipstudio/android/**/*.gradle*') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Make gradlew executable
        working-directory: artifacts/flipstudio/android
        run: chmod +x gradlew

      - name: Build Release APK
        working-directory: artifacts/flipstudio/android
        run: |
          ./gradlew assembleRelease \
            --no-daemon \
            --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m" \
            -Dorg.gradle.daemon=false

      - name: Locate APK
        id: find_apk
        run: |
          APK_PATH=$(find artifacts/flipstudio/android -name "*.apk" -path "*/release/*" | head -1)
          if [ -z "$APK_PATH" ]; then
            APK_PATH=$(find artifacts/flipstudio/android -name "*.apk" | head -1)
          fi
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"
          echo "Found: $APK_PATH"

      - name: Rename APK
        run: |
          VERSION="${{ github.ref_name }}"
          cp "${{ steps.find_apk.outputs.apk_path }}" "FlipStudio-${VERSION}.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "FlipStudio ${{ github.ref_name }}"
          body: |
            ## FlipStudio ${{ github.ref_name }}

            Download the APK below and install it on your Android device.

            ### What's new
            See commit history for changes in this release.

            ### Install Instructions
            1. Download `FlipStudio-${{ github.ref_name }}.apk`
            2. On your Android device go to **Settings → Security → Unknown sources** and enable it
            3. Open the downloaded APK and tap **Install**

            > Built from commit ${{ github.sha }}
          files: "FlipStudio-${{ github.ref_name }}.apk"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
