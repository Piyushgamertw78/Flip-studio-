// Capacitor Android path resolver — handles both pnpm and npm layouts
include ':capacitor-android'

def rootDir = rootProject.projectDir
// From android/ we go up 3 levels to workspace root, then into node_modules
def nodeModulesRoot = new File(rootDir, '../../../node_modules')

// 1. Direct npm/pnpm symlink path (works with pnpm hoisting and npm)
def directPath = new File(nodeModulesRoot, '@capacitor/android/capacitor')
if (directPath.exists()) {
    project(':capacitor-android').projectDir = directPath
} else {
    // 2. pnpm content-addressed store path (.pnpm folder with hashed names)
    def pnpmDir = new File(nodeModulesRoot, '.pnpm')
    def match = pnpmDir.exists()
        ? pnpmDir.listFiles()?.find { it.name.startsWith('@capacitor+android') }
        : null
    if (match) {
        project(':capacitor-android').projectDir = new File(match, 'node_modules/@capacitor/android/capacitor')
    } else {
        // 3. Fallback: two levels up (artifact-level node_modules)
        def fallback = new File(rootDir, '../../node_modules/@capacitor/android/capacitor')
        project(':capacitor-android').projectDir = fallback
    }
}
