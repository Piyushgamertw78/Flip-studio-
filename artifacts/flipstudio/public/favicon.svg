<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <defs>
      <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#7c3aed"/>
        <stop offset="100%" stop-color="#c026d3"/>
      </linearGradient>
      <linearGradient id="strip" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#a78bfa"/>
        <stop offset="100%" stop-color="#818cf8"/>
      </linearGradient>
    </defs>
    <!-- Background rounded rect -->
    <rect width="100" height="100" rx="22" fill="url(#bg)"/>
    <!-- Film perforations left -->
    <rect x="8" y="18" width="10" height="10" rx="2" fill="rgba(0,0,0,0.4)"/>
    <rect x="8" y="34" width="10" height="10" rx="2" fill="rgba(0,0,0,0.4)"/>
    <rect x="8" y="50" width="10" height="10" rx="2" fill="rgba(0,0,0,0.4)"/>
    <rect x="8" y="66" width="10" height="10" rx="2" fill="rgba(0,0,0,0.4)"/>
    <rect x="8" y="82" width="10" height="10" rx="2" fill="rgba(0,0,0,0.4)"/>
    <!-- Film perforations right -->
    <rect x="82" y="18" width="10" height="10" rx="2" fill="rgba(0,0,0,0.4)"/>
    <rect x="82" y="34" width="10" height="10" rx="2" fill="rgba(0,0,0,0.4)"/>
    <rect x="82" y="50" width="10" height="10" rx="2" fill="rgba(0,0,0,0.4)"/>
    <rect x="82" y="66" width="10" height="10" rx="2" fill="rgba(0,0,0,0.4)"/>
    <rect x="82" y="82" width="10" height="10" rx="2" fill="rgba(0,0,0,0.4)"/>
    <!-- Film strip body -->
    <rect x="22" y="12" width="56" height="76" rx="4" fill="rgba(0,0,0,0.25)"/>
    <!-- Film frames -->
    <rect x="26" y="16" width="22" height="22" rx="3" fill="rgba(255,255,255,0.15)"/>
    <rect x="52" y="16" width="22" height="22" rx="3" fill="rgba(255,255,255,0.15)"/>
    <rect x="26" y="42" width="22" height="22" rx="3" fill="rgba(255,255,255,0.9)"/>
    <rect x="52" y="42" width="22" height="22" rx="3" fill="rgba(255,255,255,0.15)"/>
    <rect x="26" y="68" width="22" height="16" rx="3" fill="rgba(255,255,255,0.15)"/>
    <rect x="52" y="68" width="22" height="16" rx="3" fill="rgba(255,255,255,0.15)"/>
    <!-- Pencil/brush in center white frame -->
    <line x1="32" y1="58" x2="44" y2="48" stroke="#7c3aed" stroke-width="3" stroke-linecap="round"/>
    <polygon points="44,48 46,52 42,54" fill="#7c3aed"/>
  </svg>