openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: FlipStudio Animation Studio API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: projects
    description: Animation project operations
  - name: frames
    description: Frame operations
  - name: layers
    description: Layer operations
  - name: exports
    description: Export operations
  - name: audio
    description: Audio track operations
  - name: stats
    description: Dashboard stats

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List all projects
      parameters:
        - in: query
          name: limit
          schema: { type: integer, default: 50 }
        - in: query
          name: offset
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a new project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectInput"
      responses:
        "201":
          description: Created project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{projectId}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get a project by ID
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Project details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectDetail"
        "404":
          description: Not found
    patch:
      operationId: updateProject
      tags: [projects]
      summary: Update project metadata
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectUpdate"
      responses:
        "200":
          description: Updated project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete a project
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "204":
          description: Deleted

  /projects/{projectId}/duplicate:
    post:
      operationId: duplicateProject
      tags: [projects]
      summary: Duplicate a project
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "201":
          description: Duplicated project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{projectId}/thumbnail:
    put:
      operationId: updateProjectThumbnail
      tags: [projects]
      summary: Update project thumbnail (base64 PNG)
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ThumbnailUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{projectId}/frames:
    get:
      operationId: listFrames
      tags: [frames]
      summary: List all frames for a project
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Frames list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Frame"
    post:
      operationId: createFrame
      tags: [frames]
      summary: Add a frame to a project
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FrameInput"
      responses:
        "201":
          description: Created frame
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Frame"

  /projects/{projectId}/frames/reorder:
    patch:
      operationId: reorderFrames
      tags: [frames]
      summary: Reorder frames
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FrameReorder"
      responses:
        "200":
          description: Reordered
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Frame"

  /projects/{projectId}/frames/{frameId}:
    get:
      operationId: getFrame
      tags: [frames]
      summary: Get a frame
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/FrameId"
      responses:
        "200":
          description: Frame data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Frame"
    patch:
      operationId: updateFrame
      tags: [frames]
      summary: Update frame data (canvas data, duration, hold)
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/FrameId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FrameUpdate"
      responses:
        "200":
          description: Updated frame
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Frame"
    delete:
      operationId: deleteFrame
      tags: [frames]
      summary: Delete a frame
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/FrameId"
      responses:
        "204":
          description: Deleted

  /projects/{projectId}/frames/{frameId}/duplicate:
    post:
      operationId: duplicateFrame
      tags: [frames]
      summary: Duplicate a frame
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/FrameId"
      responses:
        "201":
          description: Duplicated frame
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Frame"

  /projects/{projectId}/layers:
    get:
      operationId: listLayers
      tags: [layers]
      summary: List layers for a project
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Layers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Layer"
    post:
      operationId: createLayer
      tags: [layers]
      summary: Add a layer
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LayerInput"
      responses:
        "201":
          description: Created layer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Layer"

  /projects/{projectId}/layers/{layerId}:
    patch:
      operationId: updateLayer
      tags: [layers]
      summary: Update a layer
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/LayerId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LayerUpdate"
      responses:
        "200":
          description: Updated layer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Layer"
    delete:
      operationId: deleteLayer
      tags: [layers]
      summary: Delete a layer
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/LayerId"
      responses:
        "204":
          description: Deleted

  /projects/{projectId}/layers/reorder:
    patch:
      operationId: reorderLayers
      tags: [layers]
      summary: Reorder layers
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LayerReorder"
      responses:
        "200":
          description: Reordered layers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Layer"

  /projects/{projectId}/exports:
    get:
      operationId: listExports
      tags: [exports]
      summary: List exports for a project
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Exports
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Export"
    post:
      operationId: createExport
      tags: [exports]
      summary: Start an export job
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExportInput"
      responses:
        "201":
          description: Export job started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Export"

  /projects/{projectId}/exports/{exportId}:
    get:
      operationId: getExport
      tags: [exports]
      summary: Get export job status
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - in: path
          name: exportId
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Export job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Export"

  /projects/{projectId}/audio:
    get:
      operationId: listAudioTracks
      tags: [audio]
      summary: List audio tracks for a project
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Audio tracks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AudioTrack"
    post:
      operationId: createAudioTrack
      tags: [audio]
      summary: Add an audio track
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AudioTrackInput"
      responses:
        "201":
          description: Created audio track
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AudioTrack"

  /projects/{projectId}/audio/{audioId}:
    patch:
      operationId: updateAudioTrack
      tags: [audio]
      summary: Update an audio track
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - in: path
          name: audioId
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AudioTrackUpdate"
      responses:
        "200":
          description: Updated audio track
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AudioTrack"
    delete:
      operationId: deleteAudioTrack
      tags: [audio]
      summary: Delete an audio track
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - in: path
          name: audioId
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted

  /stats/dashboard:
    get:
      operationId: getDashboardStats
      tags: [stats]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /stats/recent-projects:
    get:
      operationId: getRecentProjects
      tags: [stats]
      summary: Get recently updated projects
      parameters:
        - in: query
          name: limit
          schema: { type: integer, default: 5 }
      responses:
        "200":
          description: Recent projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"

components:
  parameters:
    ProjectId:
      in: path
      name: projectId
      required: true
      schema: { type: integer }
    FrameId:
      in: path
      name: frameId
      required: true
      schema: { type: integer }
    LayerId:
      in: path
      name: layerId
      required: true
      schema: { type: integer }

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    Project:
      type: object
      required: [id, name, fps, canvasWidth, canvasHeight, frameCount, createdAt, updatedAt]
      properties:
        id: { type: integer }
        name: { type: string }
        description: { type: ["string", "null"] }
        fps: { type: integer }
        canvasWidth: { type: integer }
        canvasHeight: { type: integer }
        frameCount: { type: integer }
        thumbnailData: { type: ["string", "null"] }
        backgroundColor: { type: string }
        createdAt: { type: string }
        updatedAt: { type: string }

    ProjectDetail:
      type: object
      required: [id, name, fps, canvasWidth, canvasHeight, frameCount, frames, layers, createdAt, updatedAt]
      properties:
        id: { type: integer }
        name: { type: string }
        description: { type: ["string", "null"] }
        fps: { type: integer }
        canvasWidth: { type: integer }
        canvasHeight: { type: integer }
        frameCount: { type: integer }
        thumbnailData: { type: ["string", "null"] }
        backgroundColor: { type: string }
        frames:
          type: array
          items:
            $ref: "#/components/schemas/Frame"
        layers:
          type: array
          items:
            $ref: "#/components/schemas/Layer"
        createdAt: { type: string }
        updatedAt: { type: string }

    ProjectInput:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1 }
        description: { type: string }
        fps: { type: integer, default: 12 }
        canvasWidth: { type: integer, default: 1920 }
        canvasHeight: { type: integer, default: 1080 }
        backgroundColor: { type: string, default: "#ffffff" }

    ProjectUpdate:
      type: object
      properties:
        name: { type: string, minLength: 1 }
        description: { type: string }
        fps: { type: integer }
        backgroundColor: { type: string }

    ThumbnailUpdate:
      type: object
      required: [thumbnailData]
      properties:
        thumbnailData: { type: string }

    Frame:
      type: object
      required: [id, projectId, frameIndex, duration, isHold, createdAt, updatedAt]
      properties:
        id: { type: integer }
        projectId: { type: integer }
        frameIndex: { type: integer }
        duration: { type: integer }
        isHold: { type: boolean }
        canvasData: { type: ["string", "null"] }
        thumbnailData: { type: ["string", "null"] }
        createdAt: { type: string }
        updatedAt: { type: string }

    FrameInput:
      type: object
      properties:
        frameIndex: { type: integer }
        duration: { type: integer, default: 1 }
        isHold: { type: boolean, default: false }
        canvasData: { type: string }

    FrameUpdate:
      type: object
      properties:
        duration: { type: integer }
        isHold: { type: boolean }
        canvasData: { type: string }
        thumbnailData: { type: string }

    FrameReorder:
      type: object
      required: [frameIds]
      properties:
        frameIds:
          type: array
          items: { type: integer }

    Layer:
      type: object
      required: [id, projectId, name, layerIndex, isVisible, isLocked, opacity, createdAt, updatedAt]
      properties:
        id: { type: integer }
        projectId: { type: integer }
        frameId: { type: ["integer", "null"] }
        name: { type: string }
        layerIndex: { type: integer }
        isVisible: { type: boolean }
        isLocked: { type: boolean }
        opacity: { type: number }
        blendMode: { type: string }
        createdAt: { type: string }
        updatedAt: { type: string }

    LayerInput:
      type: object
      required: [name]
      properties:
        name: { type: string }
        frameId: { type: integer }
        layerIndex: { type: integer }
        opacity: { type: number, default: 1.0 }
        blendMode: { type: string, default: "normal" }

    LayerUpdate:
      type: object
      properties:
        name: { type: string }
        isVisible: { type: boolean }
        isLocked: { type: boolean }
        opacity: { type: number }
        blendMode: { type: string }

    LayerReorder:
      type: object
      required: [layerIds]
      properties:
        layerIds:
          type: array
          items: { type: integer }

    Export:
      type: object
      required: [id, projectId, format, status, quality, createdAt, updatedAt]
      properties:
        id: { type: integer }
        projectId: { type: integer }
        format: { type: string }
        status: { type: string }
        quality: { type: string }
        fps: { type: integer }
        width: { type: ["integer", "null"] }
        height: { type: ["integer", "null"] }
        progress: { type: ["number", "null"] }
        fileUrl: { type: ["string", "null"] }
        fileSize: { type: ["integer", "null"] }
        errorMessage: { type: ["string", "null"] }
        createdAt: { type: string }
        updatedAt: { type: string }

    ExportInput:
      type: object
      required: [format]
      properties:
        format: { type: string, enum: [gif, mp4, png_sequence, webm] }
        quality: { type: string, enum: [low, medium, high], default: high }
        fps: { type: integer }
        width: { type: integer }
        height: { type: integer }
        transparentBackground: { type: boolean, default: false }

    AudioTrack:
      type: object
      required: [id, projectId, name, startFrame, volume, isMuted, createdAt, updatedAt]
      properties:
        id: { type: integer }
        projectId: { type: integer }
        name: { type: string }
        audioData: { type: ["string", "null"] }
        startFrame: { type: integer }
        volume: { type: number }
        isMuted: { type: boolean }
        createdAt: { type: string }
        updatedAt: { type: string }

    AudioTrackInput:
      type: object
      required: [name]
      properties:
        name: { type: string }
        audioData: { type: string }
        startFrame: { type: integer, default: 0 }
        volume: { type: number, default: 1.0 }

    AudioTrackUpdate:
      type: object
      properties:
        name: { type: string }
        startFrame: { type: integer }
        volume: { type: number }
        isMuted: { type: boolean }

    DashboardStats:
      type: object
      required: [totalProjects, totalFrames, totalExports, recentActivity]
      properties:
        totalProjects: { type: integer }
        totalFrames: { type: integer }
        totalExports: { type: integer }
        recentActivity:
          type: array
          items:
            $ref: "#/components/schemas/ActivityItem"

    ActivityItem:
      type: object
      required: [type, projectName, timestamp]
      properties:
        type: { type: string }
        projectName: { type: string }
        timestamp: { type: string }
